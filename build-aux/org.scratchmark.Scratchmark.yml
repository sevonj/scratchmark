id: "org.scratchmark.Scratchmark"
runtime: "org.gnome.Platform"
runtime-version: "49"
sdk: "org.gnome.Sdk"
sdk-extensions:
  - "org.freedesktop.Sdk.Extension.rust-stable"
command: "scratchmark"
finish-args:
  - "--share=ipc"
  - "--socket=fallback-x11"
  - "--socket=wayland"
  - "--device=dri"
build-options:
  append-path: "/usr/lib/sdk/rust-stable/bin"
  build-args:
    - "--share=network"
  env:
    CARGO_HOME: "/run/build/scratchmark/cargo"
modules:
  - name: libspelling
    buildsystem: meson
    config-opts:
      - -Ddocs=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libspelling/0.4/libspelling-0.4.10.tar.xz
        sha256: 56e3f01a3a18b575beea4c34349f99cdaba316e1f7c271b1231f7bcf5d9af73b

  - name: "scratchmark"
    builddir: true
    buildsystem: "meson"
    config-opts:
      - "-Doffline=false"
      - "-Dbuildtype=release"
    sources:
      - type: "dir"
        path: "../"
        skip:
          - "target"
          - "test"
